name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches: [main] # Toda vez que você der push na main, ele atualiza o site

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: docs/package-json # Aponta para onde está o seu package

      - name: Install dependencies
        run: npm install
        working-directory: ./docs # Entra na sua pasta docs para instalar

      - name: Build website
        run: npm run build
        working-directory: ./docs # Entra na sua pasta docs para buildar

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build # Onde o Docusaurus gera os arquivos finais